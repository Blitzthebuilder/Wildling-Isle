name: Deploy to GitHub Pages

# Deploys two channels to one Pages site:
#   /       (production) — always built from main
#   /beta/  (staging)    — built from the branch that triggered this run,
#                          so an open PR branch is playable before merging
on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main (production channel)
        uses: actions/checkout@v4
        with:
          ref: main
          path: site
      - name: Checkout triggering branch (beta channel)
        uses: actions/checkout@v4
        with:
          path: site/beta
      - name: Strip git metadata from the artifact
        run: rm -rf site/.git site/beta/.git site/.github site/beta/.github
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
